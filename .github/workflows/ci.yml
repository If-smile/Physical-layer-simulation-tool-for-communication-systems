name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: pip install "ruff==0.15.22"

      - name: Run Ruff
        run: ruff check .

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and documentation dependencies
        run: pip install -e ".[docs]"

      - name: Build documentation
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html

  package:
    name: Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install release tools
        run: python -m pip install -e ".[release]"

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check package metadata and archive contents
        run: |
          python -m twine check --strict dist/*
          python scripts/check_distribution.py dist

      - name: Test the wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/pyberlab-release-venv"
          "$RUNNER_TEMP/pyberlab-release-venv/bin/python" -m pip install "$GITHUB_WORKSPACE"/dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/pyberlab-release-venv/bin/python" "$GITHUB_WORKSPACE/scripts/release_smoke_test.py"

      - name: Store validated distributions
        uses: actions/upload-artifact@v5
        with:
          name: pyberlab-distributions
          path: dist/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest --tb=short
